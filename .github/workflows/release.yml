name: Release

# Builds the Windows installer (.msi) and publishes it as a GitHub Release. Triggered by pushing
# a tag like "v1.0.7" (the leading "v" is stripped to get the package version), or manually via
# "Run workflow" with an explicit version input.
#
# The external tools bundled into every release (ffmpeg, whisper-cli CPU/CUDA) are NOT committed
# to this repo (see .gitignore) -- this workflow downloads them on every run from a specific
# pinned upstream release (not "latest"), verified against a known-good SHA-256 before use, and
# matching the layout documented in README.md's prerequisites section. Bumping ffmpeg/whisper.cpp
# to a newer build means deliberately updating the tag/asset/hash below, not silently absorbing
# whatever upstream happens to publish next.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.7, no leading v)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          Write-Host "Building version $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B -q clean test

      - name: Ensure WiX Toolset is available
        shell: pwsh
        run: |
          # windows-latest runners already ship a WiX Toolset 3.x install; only install one
          # via chocolatey if that's missing (e.g. a future runner image drops it), since
          # `choco install` errors out instead of no-op'ing when a newer version is already
          # present without --force/--allow-downgrade.
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path "$wixBin\candle.exe") {
            Write-Host "WiX Toolset already present at $wixBin"
          } else {
            choco install wixtoolset -y
          }

      - name: Download ffmpeg (BtbN, LGPL shared-free build)
        shell: pwsh
        # Pinned to a specific dated BtbN release (not the rolling "latest" tag) and verified
        # against a known-good SHA-256, instead of trusting whatever "latest" happens to resolve
        # to at build time: without this, a compromised upstream release would be silently
        # absorbed into the very next transcritor-ata build and shipped to every user. Bumping
        # this pin (tag + URL + hash together) is a deliberate, reviewable change.
        env:
          FFMPEG_TAG: autobuild-2026-07-23-14-16
          FFMPEG_ASSET: ffmpeg-N-125748-g80eb9e99b9-win64-lgpl.zip
          FFMPEG_SHA256: c1adebb39039462f7ffdbf5d99ea1491e5203160529fc176ea639ec9e36bdbce
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/$env:FFMPEG_TAG/$env:FFMPEG_ASSET" -OutFile ffmpeg.zip
          $actualHash = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash.ToLower()
          if ($actualHash -ne $env:FFMPEG_SHA256) {
            throw "ffmpeg download checksum mismatch (expected $env:FFMPEG_SHA256, got $actualHash) -- refusing to use it."
          }
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extracted
          # The BtbN zip wraps everything in a single version-named folder; flatten it so
          # ffmpeg.exe ends up directly at tools/ffmpeg/bin/ffmpeg.exe, as the app expects.
          $inner = Get-ChildItem ffmpeg-extracted | Select-Object -First 1
          New-Item -ItemType Directory -Path tools/ffmpeg -Force | Out-Null
          Copy-Item "$($inner.FullName)\*" tools/ffmpeg -Recurse -Force

      - name: Download whisper.cpp (CPU + CUDA builds)
        shell: pwsh
        # Pinned to a specific tagged release and verified against known-good SHA-256 hashes, for
        # the same supply-chain reason as the ffmpeg download above.
        env:
          WHISPER_TAG: v1.9.1
          WHISPER_CPU_ASSET: whisper-bin-x64.zip
          WHISPER_CPU_SHA256: 7d8be46ecd31828e1eb7a2ecdd0d6b314feafd82163038ab6092594b0a063539
          WHISPER_CUDA_ASSET: whisper-cublas-12.4.0-bin-x64.zip
          WHISPER_CUDA_SHA256: 106a2030eff8998e4ef320fe72e263a78449e9040386ee27c41ea80b001b601b
        run: |
          $ErrorActionPreference = "Stop"
          $base = "https://github.com/ggml-org/whisper.cpp/releases/download/$env:WHISPER_TAG"
          Invoke-WebRequest -Uri "$base/$env:WHISPER_CPU_ASSET" -OutFile whisper-cpu.zip
          Invoke-WebRequest -Uri "$base/$env:WHISPER_CUDA_ASSET" -OutFile whisper-cuda.zip

          $cpuHash = (Get-FileHash whisper-cpu.zip -Algorithm SHA256).Hash.ToLower()
          if ($cpuHash -ne $env:WHISPER_CPU_SHA256) {
            throw "whisper-cli CPU build checksum mismatch (expected $env:WHISPER_CPU_SHA256, got $cpuHash) -- refusing to use it."
          }
          $cudaHash = (Get-FileHash whisper-cuda.zip -Algorithm SHA256).Hash.ToLower()
          if ($cudaHash -ne $env:WHISPER_CUDA_SHA256) {
            throw "whisper-cli CUDA build checksum mismatch (expected $env:WHISPER_CUDA_SHA256, got $cudaHash) -- refusing to use it."
          }

          # These zips already contain a "Release/" folder at their root, matching the layout
          # tools/whisper-cpu/ and tools/whisper-cuda/ are expected to have.
          Expand-Archive whisper-cpu.zip -DestinationPath tools/whisper-cpu -Force
          Expand-Archive whisper-cuda.zip -DestinationPath tools/whisper-cuda -Force

      - name: Build installer (.msi)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          $env:Path = "$wixBin;$env:Path"
          .\package-installer.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $msi = Get-ChildItem "release-installer\*.msi" | Select-Object -First 1

          # Idempotent: creates the tag/release if it doesn't exist yet (workflow_dispatch runs
          # without a pre-existing tag), or just uploads the asset if the tag-push trigger
          # already has the tag and gh has auto-created a draft/notes for it.
          $existing = gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $msi.FullName --title "transcritor-ata $tag" --generate-notes
          } else {
            gh release upload $tag $msi.FullName --clobber
          }
